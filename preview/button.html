<html>

<head>
  <link rel="stylesheet" href="/src/css/classic/theme.css">
</head>

<body class="btfcss-classic">

  <h2>Buttons</h2>

  <div class="card">
    <h4>Colors</h4>
    <hr>
    <button class="btn bg-black">bg-black</button>
    <button class="btn bg-purple">bg-purple</button>
    <button class="btn bg-blue">bg-blue</button>
    <button class="btn bg-green">bg-green</button>
    <button class="btn bg-orange">bg-orange</button>
    <button class="btn bg-red">bg-red</button>
    <button class="btn bg-white">bg-white</button>
  </div>

  <div class="card">
    <h4>Size</h4>
    <hr>
    <button class="btn bg-primary btn-xl">btn-xl</button>
    <button class="btn bg-primary btn-lg">btn-lg</button>
    <button class="btn bg-primary btn-md">btn-md</button>
    <button class="btn bg-primary btn-sm">btn-sm</button>
    <button class="btn bg-primary btn-xs">btn-xs</button>
  </div>

  <div class="card">
    <h4>Rounded</h4>
    <hr>
    <button class="btn bg-blue rounded">rounded</button>
  </div>

  <div class="card">
    <h4>Disabled</h4>
    <hr>
    <button class="btn bg-primary" disabled>disabled</button>
  </div>

</body>

</html>
